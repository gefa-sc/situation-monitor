version: '3.8'

services:
  situation-monitor:
    build: .
    container_name: situation-monitor-dev
    ports:
      - "5174:5174"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5174"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: socialai-network
